name: Publish to WinGet
on:
  release:
    types: [released]
  workflow_dispatch:
jobs:
  publish:
    # Disabled until a WinGet package is registered for Fulldesk
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: Fulldesk.Fulldesk
          version: "1.0.0"
          release-tag: "1.0.0"
          token: ${{ secrets.WINGET_TOKEN }}
