allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

// AGP 8.x requires namespace for all modules. Auto-set from AndroidManifest.xml for plugins that don't declare it.
subprojects {
    pluginManager.withPlugin('com.android.library') {
        def manifest = file("src/main/AndroidManifest.xml")
        if (manifest.exists()) {
            def pkg = new groovy.util.XmlParser().parse(manifest).attribute('package')
            if (pkg) {
                android.namespace = android.namespace ?: pkg
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
